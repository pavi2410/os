[tools]
zig = "latest"
python = "latest"
uv = "latest"

[tasks.build]
description = "Build kernel and userspace binaries"
sources = ["build.zig", "build.zig.zon", "kernel/**/*", "userspace/**/*"]
outputs = ["zig-out/bin/kernel", "zig-out/userspace/bin/hello", "zig-out/userspace/bin/shell", "zig-out/userspace/bin/dig", "zig-out/userspace/bin/ping", "zig-out/userspace/bin/fetch"]
run = "zig build"

[tasks."uv-sync"]
description = "Install Python dependencies (all groups)"
sources = ["pyproject.toml", "uv.lock"]
run = "uv sync --all-groups"

[tasks.iso]
description = "Build a bootable Limine ISO"
depends = ["build", "uv-sync"]
sources = [
  "build.zig",
  "build.zig.zon",
  "kernel/**/*",
  "userspace/**/*",
  "scripts/build_iso.py",
  "scripts/common.py",
  "scripts/limine.py",
  "limine.conf",
  "limine-binary/**",
  "pyproject.toml",
  "uv.lock",
]
outputs = ["zig-out/os.iso"]
run = "uv run build-iso"

[tasks.disk]
description = "Create the FAT32 virtio test disk (README.TXT, /BIN/* user programs)"
depends = ["build", "uv-sync"]
sources = [
  "scripts/create_disk.py",
  "scripts/common.py",
  "pyproject.toml",
  "uv.lock",
  "userspace/**/*",
  "build.zig",
  "zig-out/userspace/bin/**",
]
outputs = ["zig-out/disk.img"]
run = "uv run create-disk"

[tasks.boot]
description = "Build ISO + disk, then boot in QEMU (SeaBIOS)"
depends = ["iso", "disk"]
raw = true
run = "uv run run-qemu"

[tasks."boot-uefi"]
description = "Build ISO + disk, then boot in QEMU (OVMF/UEFI)"
depends = ["iso", "disk"]
raw = true
run = "uv run run-qemu --uefi"

[tasks.test]
description = "Run host-side unit tests"
run = "zig build test"

[tasks."test-shell"]
description = "Boot the OS and smoke-test the serial shell (pytest + pexpect)"
depends = ["iso", "disk"]
sources = [
  "pyproject.toml",
  "uv.lock",
  "test/integration/**/*",
  "config/qemu.ini",
  "config/qemu-uefi.ini",
  "scripts/qemu.py",
  "scripts/create_disk.py",
]
run = "uv run pytest test/integration -v"

[tasks."kill-qemu"]
description = "Stop any QEMU instance booting this project's ISO"
depends = ["uv-sync"]
run = "uv run python -c \"from scripts.qemu import stop_qemu; stop_qemu()\""

[tasks.clean]
description = "Remove build artifacts and Zig cache"
run = "rm -rf zig-out .zig-cache"

[tasks."clean-disk"]
description = "Remove the virtio disk image (forces recreation on next run)"
run = "rm -f zig-out/disk.img"
