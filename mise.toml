[tools]
zig = "latest"

[tasks.build]
description = "Build kernel and userspace binaries"
sources = ["build.zig", "build.zig.zon", "kernel/**/*", "userspace/**/*"]
outputs = ["zig-out/bin/kernel", "zig-out/userspace/bin/hello", "zig-out/userspace/bin/shell"]
run = "zig build"

[tasks.iso]
description = "Build a bootable Limine ISO"
depends = ["build"]
sources = [
  "build.zig",
  "build.zig.zon",
  "kernel/**/*",
  "userspace/**/*",
  "scripts/build-iso.sh",
  "scripts/get-limine.sh",
  "limine.conf",
  "limine-binary/**",
]
outputs = ["zig-out/os.iso"]
run = "sh scripts/build-iso.sh zig-out/bin/kernel zig-out/os.iso"

[tasks.disk]
description = "Create the FAT32 virtio test disk (README.TXT, /BIN/* user programs)"
depends = ["build"]
sources = ["scripts/create-disk.sh", "userspace/**/*", "build.zig", "zig-out/userspace/bin/**"]
outputs = ["zig-out/disk.img"]
run = "sh scripts/create-disk.sh"

[tasks.boot]
description = "Build ISO + disk, then boot in QEMU (SeaBIOS)"
depends = ["iso", "disk"]
raw = true
run = "sh scripts/run-qemu.sh"

[tasks."boot-uefi"]
description = "Build ISO + disk, then boot in QEMU (OVMF/UEFI)"
depends = ["iso", "disk"]
raw = true
run = "sh scripts/run-qemu.sh --uefi"

[tasks.test]
description = "Run host-side unit tests"
run = "zig build test"

[tasks."test-shell"]
description = "Boot the OS and smoke-test the serial shell (host-driven)"
depends = ["iso", "disk"]
run = "sh scripts/test-shell.sh"

[tasks."kill-qemu"]
description = "Stop any QEMU instance booting this project's ISO"
run = "pkill -f 'qemu-system-x86_64.*os.iso' 2>/dev/null || true"

[tasks.clean]
description = "Remove build artifacts and Zig cache"
run = "rm -rf zig-out .zig-cache"

[tasks."clean-disk"]
description = "Remove the virtio disk image (forces recreation on next run)"
run = "rm -f zig-out/disk.img"
