[tools]
zig = "latest"
python = "latest"
uv = "latest"

[tasks.build]
description = "Build kernel and compact bootable userspace binaries"
sources = ["build.zig", "build.zig.zon", "kernel/**/*", "userspace/**/*"]
outputs = ["zig-out/bin/kernel", "zig-out/userspace/bin/shell", "zig-out/userspace/bin/dig", "zig-out/userspace/bin/ping", "zig-out/userspace/bin/curl", "zig-out/userspace/bin/ip", "zig-out/userspace/bin/lscpu", "zig-out/userspace/bin/lspci", "zig-out/userspace/bin/lsblk", "zig-out/userspace/bin/lsmem", "zig-out/userspace/bin/utest", "zig-out/userspace/bin/cowtest", "zig-out/userspace/bin/mmaptest"]
run = "zig build"

[tasks."uv-sync"]
description = "Install Python dependencies (all groups)"
sources = ["pyproject.toml", "uv.lock"]
run = "uv sync --all-groups"

[tasks.iso]
description = "Build a bootable Limine ISO"
depends = ["build", "uv-sync"]
sources = [
  "build.zig",
  "build.zig.zon",
  "kernel/**/*",
  "userspace/**/*",
  "scripts/build_iso.py",
  "scripts/common.py",
  "scripts/limine.py",
  "limine.conf",
  "limine-binary/**",
  "pyproject.toml",
  "uv.lock",
]
outputs = ["zig-out/os.iso"]
run = "uv run build-iso"

[tasks.disk]
description = "Create the FAT32 virtio test disk (README.TXT, /BIN/* user programs)"
depends = ["build", "uv-sync"]
sources = [
  "scripts/create_disk.py",
  "scripts/common.py",
  "pyproject.toml",
  "uv.lock",
  "userspace/**/*",
  "build.zig",
  "zig-out/userspace/bin/**",
]
outputs = ["zig-out/disk.img"]
run = "uv run create-disk"

[tasks.boot]
description = "Build ISO + disk, then boot in QEMU (SeaBIOS)"
depends = ["iso", "disk"]
raw = true
run = "uv run run-qemu"

[tasks."boot-uefi"]
description = "Build ISO + disk, then boot in QEMU (OVMF/UEFI)"
depends = ["iso", "disk"]
raw = true
run = "uv run run-qemu --uefi"

[tasks.test]
description = "Run fast host-side unit tests (compatibility alias)"
run = "zig build test-host"

[tasks."test-host"]
description = "Run fast host-side unit tests"
run = "zig build test-host"

[tasks."test-shell"]
description = "Boot the OS and run deterministic serial-shell smoke tests"
depends = ["iso", "disk"]
sources = [
  "pyproject.toml",
  "uv.lock",
  "test/integration/**/*",
  "config/qemu.ini",
  "config/qemu-uefi.ini",
  "scripts/qemu.py",
  "scripts/create_disk.py",
]
run = "uv run pytest test/integration/test_shell.py -v -m 'not network'"

[tasks."test-shell-smoke"]
description = "Alias for deterministic serial-shell smoke tests"
depends = ["test-shell"]

[tasks."test-extended"]
description = "Run network-dependent QEMU diagnostics (not required for the fast gate)"
depends = ["iso", "disk"]
run = "uv run pytest test/integration/test_shell.py -v -m network"

[tasks."test-in-guest"]
description = "Boot the OS and verify kernel/userspace TAP self-tests"
depends = ["iso", "disk"]
sources = [
  "pyproject.toml",
  "uv.lock",
  "test/integration/**/*",
  "config/qemu.ini",
  "config/qemu-uefi.ini",
  "scripts/qemu.py",
  "scripts/create_disk.py",
  "common/tap.zig",
  "kernel/boot/tap_suite.zig",
  "userspace/utest/**/*",
]
run = "uv run pytest test/integration/test_in_guest.py -v"

[tasks."test-smp"]
description = "Boot with -smp and verify multiple CPUs come online"
depends = ["iso", "disk"]
sources = [
  "pyproject.toml",
  "uv.lock",
  "test/integration/test_smp.py",
  "test/integration/shell_session.py",
  "config/qemu.ini",
  "scripts/qemu.py",
]
run = "uv run pytest test/integration/test_smp.py -v"

[tasks."kill-qemu"]
description = "Stop any QEMU instance booting this project's ISO"
depends = ["uv-sync"]
run = "uv run python -c \"from scripts.qemu import stop_qemu; stop_qemu()\""

[tasks.clean]
description = "Remove build artifacts and Zig cache"
run = "rm -rf zig-out .zig-cache"

[tasks."clean-disk"]
description = "Remove the virtio disk image (forces recreation on next run)"
run = "rm -f zig-out/disk.img"
