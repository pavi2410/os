# SeaBIOS/UEFI guest: q35 + Limine ISO + virtio-blk test disk + QMP.
# Paths are relative to the repo root (run-qemu cwd).
#
#   uv run run-qemu
#   uv run run-qemu --uefi   # also loads qemu-uefi.ini

[machine]
type = "q35"

[drive "iso"]
file = "zig-out/os.iso"
format = "raw"
if = "none"
media = "cdrom"

[device "cdrom"]
driver = "ide-cd"
drive = "iso"
bootindex = "1"

[drive "disk0"]
file = "zig-out/disk.img"
format = "raw"
if = "none"

[device "virtio-disk"]
driver = "virtio-blk-pci"
drive = "disk0"
disable-legacy = "on"

[chardev "qmp"]
backend = "socket"
path = "zig-out/qemu.qmp.sock"
server = "on"
wait = "off"

[mon "qmp"]
mode = "control"
chardev = "qmp"
